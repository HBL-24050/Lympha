# Lympha — Asymmetrical Multi-Tier Dual-Threshold Security Pipeline
# =================================================================

mode: test  # "test" → log-only, no iptables changes | "production" → enforce iptables blocks

interfaces:
  capture: "lo"          # packet capture / monitoring interface
  control: "lo"          # interface for iptables rules

# ── Tier 1: Line-Rate Frontline ──────────────────────────────────
tier1:
  enabled: true
  xgboost:
    model_path: "models/tier1/xgboost_model.json"   # XGBoost Booster serialized
    feature_dim: 48                                  # number of handcrafted tabular features
    threshold_instant_drop: 0.92                     # high confidence → instant block
    threshold_warning: 0.70                          # moderate → route to Guardrail
  mamba:
    model_path: "models/tier1/mamba_state_dict.pt"   # Mamba SSM checkpoint
    sequence_length: 512
    threshold_instant_drop: 0.90
    threshold_warning: 0.65
  cooldown_seconds: 300          # how long until an iptables block rule is removed

# ── Tier 2: Prompt Injection Guardrail ──────────────────────────
tier2:
  enabled: true
  guardrail:
    threshold_instant_drop: 0.85                  # prompt injection score → instant iptables block
    threshold_warning: 0.40                       # below this → ignore, above → populate state cache

  state_cache:
    backend: "memory"                             # "redis" or "memory"
    redis_url: "redis://localhost:6379/0"
    accumulation_threshold: 10                    # sum of Warning_Weight across time window → trigger Tier 3
    window_seconds: 3600                          # sliding time window in seconds
    decay_half_life: 600                          # exponential half-life for weight decay

# ── Tier 3: Generative LLM Reasoner ─────────────────────────────
tier3:
  enabled: false                                  # enable once an OpenAI-compatible endpoint is available
  api_base: "http://localhost:8000/v1"
  api_key: ""
  model: "gpt-4o-mini"
  max_tokens: 2048
  trigger_threshold: 10                           # min accumulated weight to wake Tier 3
  system_prompt: "You are a security analyst reviewing HTTP traffic warnings. Given a list of alerts with warning weights and tactic descriptions, determine if this traffic represents a coordinated attack. Respond with exactly one word: BLOCK if the evidence strongly indicates an attack, WARN if suspicious but inconclusive, or PASS if likely benign."

# ── Logging ──────────────────────────────────────────────────────
logging:
  level: "DEBUG"               # DEBUG | INFO | WARNING | ERROR
  file: "logs/lympa.log"
  console: true
